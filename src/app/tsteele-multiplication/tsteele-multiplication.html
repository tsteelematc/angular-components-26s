<mat-card
    appearance="outlined"
>
    <mat-card-header>
        <mat-card-title>
            Tom's Multiplication Component
        </mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <br />
        <mat-form-field>
            <mat-label>
                Number One
            </mat-label>
            <input 
                type="number"
                matInput 
                [value]="numberOne()"
                (input)="updateNumberOne($event.target.value)" 
            />
        </mat-form-field>
        ×
        <mat-form-field>
            <mat-label>
                Number Two
            </mat-label>
            <input 
                type="number"
                matInput 
                [value]="numberTwo()"
                (input)="updateNumberTwo($event.target.value)" 
            />
        </mat-form-field>
        &nbsp;
        <button
            matButton="outlined"
            (click)="multiply()"
        >
            =
        </button>
        &nbsp;
        {{ product() }}
    </mat-card-content>
</mat-card>
